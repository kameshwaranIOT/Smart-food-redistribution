name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Build React app
        run: |
          cd client
          npm run build
        env:
          REACT_APP_API_URL: /api
          REACT_APP_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          REACT_APP_FIREBASE_PROJECT_ID: smart-food-redistributio-a1ad7
          REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          REACT_APP_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}

      - name: Install functions dependencies
        run: |
          cd functions
          npm install

      - name: Deploy to Firebase
        run: |
          firebase deploy --token ${{ secrets.FIREBASE_TOKEN }} --project smart-food-redistributio-a1ad7
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Get deployment info
        run: |
          echo "✅ Frontend deployed to Firebase Hosting"
          echo "✅ Backend deployed to Cloud Functions"
          echo "🔗 Live URL: https://smart-food-redistributio-a1ad7.web.app"
          echo "📚 API URL: https://asia-southeast1-smart-food-redistributio-a1ad7.cloudfunctions.net/api"
